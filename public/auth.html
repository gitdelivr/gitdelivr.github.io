<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Action | GitDelivr</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        slate: { 900: '#0f172a', 800: '#1e293b', 700: '#334155' },
                        blue: { 600: '#2563eb' }
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-slate-900 min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md">
        <!-- Branding -->
        <div class="flex justify-center mb-8">
            <a href="index.html" class="flex items-center gap-3 group">
                <div class="bg-blue-600 text-white p-2 rounded-xl shadow-lg shadow-blue-500/20 group-hover:scale-110 transition-transform duration-300">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                </div>
                <span class="text-2xl font-extrabold tracking-tight text-white">Git<span class="text-blue-500">Delivr</span></span>
            </a>
        </div>

        <!-- Main Card -->
        <div class="bg-slate-800 rounded-2xl shadow-2xl border border-slate-700 p-8 relative overflow-hidden min-h-[300px] flex flex-col justify-center">
            
            <!-- 1. LOADING / PROCESSING STATE -->
            <div id="view-loading" class="flex flex-col items-center justify-center text-center space-y-4">
                <svg class="animate-spin h-10 w-10 text-blue-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                <h3 id="loading-text" class="text-xl font-bold text-white">Processing...</h3>
                <p class="text-slate-400 text-sm">Please wait a moment.</p>
            </div>

            <!-- 2. RESET PASSWORD FORM -->
            <div id="view-reset-password" class="hidden">
                <h2 class="text-2xl font-bold text-white mb-2 text-center">Set New Password</h2>
                <p id="reset-email-display" class="text-blue-400 text-sm text-center mb-6 font-medium"></p>

                <form id="resetForm" class="space-y-6">
                    <div>
                        <label for="password" class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">New Password</label>
                        <div class="relative">
                            <input type="password" id="password" required minlength="6"
                                class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all"
                                placeholder="••••••••">
                            <button type="button" id="togglePassword" class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-500 hover:text-slate-300 transition-colors p-1">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" id="eyeIcon"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg>
                            </button>
                        </div>
                    </div>
                    <button type="submit" id="resetBtn" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3.5 rounded-xl shadow-lg shadow-blue-600/20 transition-all transform hover:-translate-y-0.5">
                        Update Password
                    </button>
                </form>
            </div>

            <!-- 3. SUCCESS MESSAGE (Generic) -->
            <div id="view-success" class="hidden flex-col items-center justify-center text-center">
                <div class="w-16 h-16 bg-green-500/10 rounded-full flex items-center justify-center mb-6 ring-1 ring-green-500/20">
                    <svg class="w-8 h-8 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
                </div>
                <h3 id="success-title" class="text-xl font-bold text-white mb-2">Success!</h3>
                <p id="success-desc" class="text-slate-400 text-sm mb-8">Action completed successfully.</p>
                <a href="index.html" class="w-full block bg-slate-700 hover:bg-slate-600 text-white font-bold py-3 rounded-xl transition-colors">
                    Go to Dashboard
                </a>
            </div>

            <!-- 4. ERROR MESSAGE (Generic) -->
            <div id="view-error" class="hidden flex-col items-center justify-center text-center">
                <div class="w-16 h-16 bg-red-500/10 rounded-full flex items-center justify-center mb-6 ring-1 ring-red-500/20">
                    <svg class="w-8 h-8 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </div>
                <h3 class="text-xl font-bold text-white mb-2">Action Failed</h3>
                <p id="error-desc" class="text-slate-400 text-sm mb-8">The link may be invalid or expired.</p>
                <a href="index.html" class="w-full block bg-slate-700 hover:bg-slate-600 text-white font-bold py-3 rounded-xl transition-colors">
                    Return Home
                </a>
            </div>

        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, verifyPasswordResetCode, confirmPasswordReset, applyActionCode, checkActionCode } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // Initialize Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyC_U_pYSYWNm6Q1ufFwQE_tYlQZIYeDU0g",
            authDomain: "gitdelivr.in",
            projectId: "cdn-generator",
            storageBucket: "cdn-generator.firebasestorage.app",
            messagingSenderId: "44677120607",
            appId: "1:44677120607:web:b4719f7b7c6414cd19d1ea",
            measurementId: "G-9RK16SGB09"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // UI Elements
        const views = {
            loading: document.getElementById('view-loading'),
            reset: document.getElementById('view-reset-password'),
            success: document.getElementById('view-success'),
            error: document.getElementById('view-error')
        };

        // Helper: Switch Views
        function showView(viewName) {
            Object.values(views).forEach(el => el.classList.add('hidden'));
            if(views[viewName]) views[viewName].classList.remove('hidden');
            if(viewName === 'loading') views.loading.classList.add('flex'); // Restore flex
            if(viewName === 'success' || viewName === 'error') views[viewName].classList.add('flex');
        }

        // Helper: Update Text
        function setText(id, text) {
            const el = document.getElementById(id);
            if(el) el.innerText = text;
        }

        // Core Logic
        async function handleAuthAction() {
            const params = new URLSearchParams(window.location.search);
            const mode = params.get('mode');
            const actionCode = params.get('oobCode');

            if (!mode || !actionCode) {
                setText('error-desc', 'Invalid or missing link parameters.');
                showView('error');
                return;
            }

            try {
                switch (mode) {
                    case 'resetPassword':
                        setText('loading-text', 'Verifying Link...');
                        // 1. Verify code first to get email
                        const email = await verifyPasswordResetCode(auth, actionCode);
                        setText('reset-email-display', email);
                        
                        // 2. Show Reset Form
                        showView('reset');
                        
                        // Bind Submit Handler
                        document.getElementById('resetForm').addEventListener('submit', async (e) => {
                            e.preventDefault();
                            const newPassword = document.getElementById('password').value;
                            const btn = document.getElementById('resetBtn');
                            
                            if (newPassword.length < 6) return alert("Password must be at least 6 characters.");
                            
                            btn.disabled = true;
                            btn.innerText = "Updating...";
                            
                            try {
                                await confirmPasswordReset(auth, actionCode, newPassword);
                                setText('success-title', 'Password Updated');
                                setText('success-desc', 'You can now login with your new password.');
                                showView('success');
                            } catch (err) {
                                alert(err.message);
                                btn.disabled = false;
                                btn.innerText = "Update Password";
                            }
                        });
                        break;

                    case 'verifyEmail':
                        setText('loading-text', 'Verifying Email...');
                        await applyActionCode(auth, actionCode);
                        setText('success-title', 'Email Verified');
                        setText('success-desc', 'Your account is now active. Thank you for verifying!');
                        showView('success');
                        break;

                    case 'recoverEmail':
                        setText('loading-text', 'Restoring Account...');
                        // 1. Check code to get details
                        const info = await checkActionCode(auth, actionCode);
                        const restoredEmail = info.data.email || 'your previous email';

                        // 2. Apply Revert
                        await applyActionCode(auth, actionCode);
                        
                        setText('success-title', 'Action Reverted');
                        setText('success-desc', `Your email has been restored to ${restoredEmail}. Please reset your password immediately if you did not authorize this change.`);
                        showView('success');
                        break;

                    default:
                        setText('error-desc', 'Unknown action mode.');
                        showView('error');
                }
            } catch (error) {
                console.error(error);
                let msg = "The link is invalid or has expired.";
                if (error.code === 'auth/expired-action-code') msg = "This link has expired. Please request a new one.";
                if (error.code === 'auth/invalid-action-code') msg = "This link has already been used or is invalid.";
                if (error.code === 'auth/user-disabled') msg = "The user account has been disabled.";
                if (error.code === 'auth/user-not-found') msg = "User not found.";
                
                setText('error-desc', msg);
                showView('error');
            }
        }

        // Toggle Password Visibility Logic
        const toggleBtn = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');
        const eyeIcon = document.getElementById('eyeIcon');
        
        if(toggleBtn) {
            toggleBtn.addEventListener('click', () => {
                const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                passwordInput.setAttribute('type', type);
                if (type === 'text') {
                    // Slash icon
                    eyeIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"></path>';
                } else {
                    // Normal eye icon
                    eyeIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>';
                }
            });
        }

        // Run on Load
        handleAuthAction();
    </script>
</body>
</html>
