<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set New Password | GitDelivr</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        slate: {
                            900: '#0f172a', // Deep dark background
                            800: '#1e293b', // Card background
                            700: '#334155', // Border
                        },
                        blue: {
                            600: '#2563eb', // Brand blue
                        }
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-900 min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md">
        <!-- Logo Placeholder -->
        <div class="flex justify-center mb-8">
            <a href="index.html" class="flex items-center gap-3 group">
                <div class="bg-blue-600 text-white p-2 rounded-xl shadow-lg shadow-blue-500/20 group-hover:scale-110 transition-transform duration-300">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                </div>
                <span class="text-2xl font-extrabold tracking-tight text-white">Git<span class="text-blue-500">Delivr</span></span>
            </a>
        </div>

        <!-- Main Card -->
        <div class="bg-slate-800 rounded-2xl shadow-2xl border border-slate-700 p-8 relative overflow-hidden">
            
            <!-- Success Overlay -->
            <div id="successView" class="absolute inset-0 bg-slate-800 z-20 flex flex-col items-center justify-center text-center p-8 transition-opacity duration-300 opacity-0 pointer-events-none">
                <div class="w-16 h-16 bg-green-500/10 rounded-full flex items-center justify-center mb-4">
                    <svg class="w-8 h-8 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
                </div>
                <h3 class="text-xl font-bold text-white mb-2">Password Reset!</h3>
                <p class="text-slate-400 text-sm">Your password has been successfully updated.</p>
                <p class="text-blue-400 text-sm mt-6 animate-pulse">Redirecting to login...</p>
            </div>

            <!-- Form Content -->
            <div id="formContent" class="relative z-10">
                <h2 class="text-2xl font-bold text-white mb-2 text-center">Set New Password</h2>
                <p class="text-slate-400 text-sm text-center mb-8">Enter a strong password to secure your account.</p>

                <form id="resetForm" class="space-y-6">
                    <div>
                        <label for="password" class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">New Password</label>
                        <div class="relative">
                            <input type="password" id="password" required minlength="6"
                                class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all"
                                placeholder="••••••••">
                            <button type="button" id="togglePassword" class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-500 hover:text-slate-300 transition-colors p-1">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" id="eyeIcon"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg>
                            </button>
                        </div>
                        <p id="errorMsg" class="text-red-500 text-xs mt-2 hidden"></p>
                    </div>

                    <button type="submit" id="submitBtn" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3.5 rounded-xl shadow-lg shadow-blue-600/20 transition-all transform hover:-translate-y-0.5 active:translate-y-0 disabled:opacity-70 disabled:cursor-not-allowed flex items-center justify-center gap-2">
                        <span>Reset Password</span>
                    </button>
                </form>

                <div class="mt-6 text-center">
                    <a href="index.html" class="text-sm font-medium text-slate-500 hover:text-slate-300 transition-colors">Cancel</a>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, verifyPasswordResetCode, confirmPasswordReset } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC_U_pYSYWNm6Q1ufFwQE_tYlQZIYeDU0g",
            authDomain: "cdn-generator.firebaseapp.com",
            projectId: "cdn-generator",
            storageBucket: "cdn-generator.firebasestorage.app",
            messagingSenderId: "44677120607",
            appId: "1:44677120607:web:b4719f7b7c6414cd19d1ea",
            measurementId: "G-9RK16SGB09"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        const form = document.getElementById('resetForm');
        const passwordInput = document.getElementById('password');
        const toggleBtn = document.getElementById('togglePassword');
        const eyeIcon = document.getElementById('eyeIcon');
        const submitBtn = document.getElementById('submitBtn');
        const errorMsg = document.getElementById('errorMsg');
        const successView = document.getElementById('successView');

        // Auto-extract oobCode
        const urlParams = new URLSearchParams(window.location.search);
        const oobCode = urlParams.get('oobCode');

        if (!oobCode) {
            showError("Invalid or missing reset link. Please check your email.");
            submitBtn.disabled = true;
        }

        toggleBtn.addEventListener('click', () => {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            eyeIcon.innerHTML = type === 'text' ? '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"></path>' : '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>';
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const newPassword = passwordInput.value;
            if (newPassword.length < 6) return showError("Password must be at least 6 characters.");

            submitBtn.disabled = true;
            submitBtn.innerHTML = `<svg class="animate-spin -ml-1 mr-2 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> Updating...`;
            
            try {
                await confirmPasswordReset(auth, oobCode, newPassword);
                successView.classList.remove('opacity-0', 'pointer-events-none');
                setTimeout(() => window.location.href = 'index.html', 3000);
            } catch (error) {
                submitBtn.disabled = false;
                submitBtn.innerHTML = `Reset Password`;
                showError(error.message);
            }
        });

        function showError(msg) { errorMsg.textContent = msg; errorMsg.classList.remove('hidden'); }
    </script>
</body>
</html>
