<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Email | GitDelivr</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        slate: {
                            900: '#0f172a',
                            800: '#1e293b',
                            700: '#334155',
                        },
                        blue: {
                            600: '#2563eb',
                        }
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .view { display: none; }
        .view.active { display: flex; }
    </style>
</head>
<body class="bg-slate-900 min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md">
        <!-- Logo -->
        <div class="flex justify-center mb-8">
            <a href="index.html" class="flex items-center gap-3 group">
                <div class="bg-blue-600 text-white p-2 rounded-xl shadow-lg shadow-blue-500/20 group-hover:scale-110 transition-transform duration-300">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                </div>
                <span class="text-2xl font-extrabold tracking-tight text-white">Git<span class="text-blue-500">Delivr</span></span>
            </a>
        </div>

        <!-- Main Card -->
        <div class="bg-slate-800 rounded-2xl shadow-2xl border border-slate-700 p-8 text-center">
            
            <!-- Processing View -->
            <div id="processingView" class="view active flex-col items-center justify-center">
                <svg class="animate-spin h-10 w-10 text-blue-500 mb-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                <h3 class="text-xl font-bold text-white">Verifying your email...</h3>
                <p class="text-slate-400 text-sm mt-2">Please wait a moment.</p>
            </div>

            <!-- Success View -->
            <div id="successView" class="view flex-col items-center justify-center">
                <div class="w-16 h-16 bg-green-500/10 rounded-full flex items-center justify-center mb-4">
                    <svg class="w-8 h-8 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
                </div>
                <h3 class="text-xl font-bold text-white mb-2">Email Verified!</h3>
                <p class="text-slate-400 text-sm mb-8">Your account is now active. You can now log in to access all features.</p>
                <a href="index.html" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3.5 rounded-xl shadow-lg shadow-blue-600/20 transition-all transform hover:-translate-y-0.5">
                    Go to Login
                </a>
            </div>

            <!-- Error View -->
            <div id="errorView" class="view flex-col items-center justify-center">
                <div class="w-16 h-16 bg-red-500/10 rounded-full flex items-center justify-center mb-4">
                    <svg class="w-8 h-8 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </div>
                <h3 class="text-xl font-bold text-white mb-2">Verification Failed</h3>
                <p id="errorText" class="text-slate-400 text-sm mb-8">The link may be invalid or expired. Please try again or request a new link.</p>
                <a href="index.html" class="w-full bg-slate-600 hover:bg-slate-500 text-white font-bold py-3.5 rounded-xl transition-all">
                    Back to Homepage
                </a>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, applyActionCode } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC_U_pYSYWNm6Q1ufFwQE_tYlQZIYeDU0g",
            authDomain: "cdn-generator.firebaseapp.com",
            projectId: "cdn-generator",
            storageBucket: "cdn-generator.firebasestorage.app",
            messagingSenderId: "44677120607",
            appId: "1:44677120607:web:b4719f7b7c6414cd19d1ea",
            measurementId: "G-9RK16SGB09"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        const processingView = document.getElementById('processingView');
        const successView = document.getElementById('successView');
        const errorView = document.getElementById('errorView');
        const errorText = document.getElementById('errorText');

        function switchView(viewId) {
            ['processingView', 'successView', 'errorView'].forEach(id => {
                document.getElementById(id).classList.remove('active');
            });
            document.getElementById(viewId).classList.add('active');
        }

        async function handleVerification() {
            const urlParams = new URLSearchParams(window.location.search);
            const oobCode = urlParams.get('oobCode');

            if (!oobCode) {
                errorText.textContent = "Invalid or missing verification link. Please check the link in your email.";
                switchView('errorView');
                return;
            }

            try {
                await applyActionCode(auth, oobCode);
                switchView('successView');
            } catch (error) {
                let message = "An unknown error occurred. The link may be expired or already used.";
                if (error.code === 'auth/invalid-action-code') {
                    message = "This verification link is invalid or has already been used. Please sign up again to get a new link.";
                }
                console.error("Verification error:", error);
                errorText.textContent = message;
                switchView('errorView');
            }
        }

        handleVerification();
    </script>
</body>
</html>
